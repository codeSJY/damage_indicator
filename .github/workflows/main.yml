name: Run damage indicator script

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run marker detection
        run: python3 test_gemini.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marker-detection-results
          path: results.csv
