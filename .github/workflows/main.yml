name: Run damage indicator script

on:
  workflow_dispatch:
    inputs:
      image_list:
        description: '분석할 이미지 목록 파일'
        required: false
        default: 'image_list.json'
        type: choice
        options:
          - image_list_sample.json
          - image_list.json

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      IMAGE_LIST: ${{ inputs.image_list }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run marker detection
        run: python3 test_gemini.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marker-detection-results
          path: results.csv
